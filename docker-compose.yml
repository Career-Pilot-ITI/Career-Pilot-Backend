services:
  backend:
    build:
      context: ./career-pilot-backend
      dockerfile: Dockerfile
    container_name: career-pilot-api
    restart: unless-stopped
    network_mode: host
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL: ${REDIS_SSL}
      SPRING_DATA_REDIS_SSL_ENABLED: ${REDIS_SSL}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TIME: ${JWT_TIME:-3600000}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      URI_APP: ${URI_APP:-http://localhost:5173}
      REDIRECT_URI_BASE: ${REDIRECT_URI_BASE:-http://localhost:8080}
      OTP_PROVIDER: ${OTP_PROVIDER:-simulated}
      WIREWEB_API_KEY: ${WIREWEB_API_KEY:-}
      WIREWEB_SESSION_ID: ${WIREWEB_SESSION_ID:-}
      WIREWEB_BASE_URL: ${WIREWEB_BASE_URL:-https://app.wireweb.co.in}
      PAYMOB_BASE_URL: ${PAYMOB_BASE_URL:-https://accept.paymob.com}
      PAYMOB_SECRET_KEY: ${PAYMOB_SECRET_KEY:-}
      PAYMOB_PUBLIC_KEY: ${PAYMOB_PUBLIC_KEY:-}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET:-}
      PAYMOB_NOTIFICATION_URL: ${PAYMOB_NOTIFICATION_URL:-}
      PAYMOB_REDIRECTION_URL: ${PAYMOB_REDIRECTION_URL:-http://localhost:5173/payment/result}
      PAYMOB_INTEGRATION_ID_CARD: ${PAYMOB_INTEGRATION_ID_CARD:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen:latest}
      SPRING_AI_OLLAMA_CONNECT_TIMEOUT: 30s
      SPRING_AI_OLLAMA_READ_TIMEOUT: 5m
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
