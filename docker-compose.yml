services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: career-pilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-career_pilot}
      POSTGRES_USER: ${DB_USERNAME:-career_pilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-career_pilot} -d ${DB_NAME:-career_pilot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: career-pilot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./career-pilot-backend
      dockerfile: Dockerfile
    container_name: career-pilot-api
    restart: unless-stopped
    ports:
      - "7070:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-career_pilot}
      DB_USERNAME: ${DB_USERNAME:-career_pilot}
      DB_PASSWORD: ${DB_PASSWORD:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TIME: ${JWT_TIME:-3600000}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      URI_APP: ${URI_APP:-http://localhost:5173}
      REDIRECT_URI_BASE: ${REDIRECT_URI_BASE:-http://localhost:8080}
      OTP_PROVIDER: ${OTP_PROVIDER:-simulated}
      WIREWEB_API_KEY: ${WIREWEB_API_KEY:-}
      WIREWEB_SESSION_ID: ${WIREWEB_SESSION_ID:-}
      WIREWEB_BASE_URL: ${WIREWEB_BASE_URL:-https://app.wireweb.co.in}
      PAYMOB_BASE_URL: ${PAYMOB_BASE_URL:-https://accept.paymob.com}
      PAYMOB_SECRET_KEY: ${PAYMOB_SECRET_KEY:-}
      PAYMOB_PUBLIC_KEY: ${PAYMOB_PUBLIC_KEY:-}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET:-}
      PAYMOB_NOTIFICATION_URL: ${PAYMOB_NOTIFICATION_URL:-}
      PAYMOB_REDIRECTION_URL: ${PAYMOB_REDIRECTION_URL:-http://localhost:5173/payment/result}
      PAYMOB_INTEGRATION_ID_CARD: ${PAYMOB_INTEGRATION_ID_CARD:-}
      # LLM — Ollama on host, or set these in .env for OpenAI cloud
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen:latest}
      SPRING_AI_OLLAMA_CONNECT_TIMEOUT: 30s
      SPRING_AI_OLLAMA_READ_TIMEOUT: 5m
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  redisdata:
