server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    time-zone: America/Lima
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/career_pilot}
    username: ${DB_USERNAME:career_pilot}
    password: ${DB_PASSWORD:career_pilot}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  ai:
    chat:
      client:
        enabled: true
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3}
          temperature: ${LLM_TEMPERATURE:0.4}
    openai:
      base-url: ${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      api-key: ${LLM_API_KEY:not-set}
      chat:
        options:
          model: ${LLM_MODEL:gemini-3.1-flash-lite}
          temperature: ${LLM_TEMPERATURE:0.4}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

paymob:
  base-url: ${PAYMOB_BASE_URL:https://accept.paymob.com}
  secret-key: ${PAYMOB_SECRET_KEY:}
  public-key: ${PAYMOB_PUBLIC_KEY:}
  hmac-secret: ${PAYMOB_HMAC_SECRET:}
  notification-url: ${PAYMOB_NOTIFICATION_URL:}
  redirection-url: ${PAYMOB_REDIRECTION_URL:http://localhost:5173/payment/result}
  integration-ids:
    card: ${PAYMOB_INTEGRATION_ID_CARD:0}

security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration-time: ${JWT_TIME:3600000}
