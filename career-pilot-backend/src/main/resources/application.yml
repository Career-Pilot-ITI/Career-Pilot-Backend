app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  upload:
    path: ${UPLOAD_PATH:./uploads}
  redirect:
    uri:
      app: ${URI_APP:http://localhost:5173}
  otp:
    provider: ${OTP_PROVIDER:simulated}
  wireweb:
    api-key: ${WIREWEB_API_KEY:}
    session-id: ${WIREWEB_SESSION_ID:}
    base-url: ${WIREWEB_BASE_URL:https://app.wireweb.co.in}
management:
  health:
    mail:
      enabled: false

logging:
  level:
    org.springframework.security: WARN
    org.springframework.web: WARN
    com.careerpilot: INFO

